# Railway Config as Code — pakai Dockerfile (hindari conflict Nixpacks node)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Overrides leftover dashboard Custom Start Command that still runs `artisan serve`
startCommand = "/bin/sh ./docker/start.sh"
