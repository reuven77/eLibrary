[phases.setup]
# Paksa Railway menggunakan PHP 8.4 dan Node 20
nixPkgs = ["php84", "nodejs_20"]

[phases.build]
# Urutan build yang aman untuk Laravel + Vite
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build"
]

[start]
# Menggunakan script start.sh yang sudah kita buat sebelumnya 
# untuk menghindari error "string + int" pada PORT di PHP 8.4
cmd = "sh docker/start.sh"