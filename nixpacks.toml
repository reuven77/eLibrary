# Nixpacks — RuangBaca (Laravel 13 + Vite + Tailwind) untuk Railway
#
# PENTING Vite production:
# - public/build di-gitignore → WAJIB di-build di CI/Railway
# - JANGAN `npm install --omit=dev` (Vite/Tailwind ada di devDependencies)
# - JANGAN set ASSET_URL di Railway (biarkan kosong)
# - APP_URL harus = domain production exact

providers = ["php", "node"]

[variables]
NIXPACKS_PHP_VERSION = "8.4"
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = [
  "...",
  "php84Extensions.bcmath",
  "php84Extensions.gd",
  "php84Extensions.intl",
  "php84Extensions.mbstring",
  "php84Extensions.pdo",
  "php84Extensions.pgsql",
  "php84Extensions.tokenizer",
  "php84Extensions.xml",
  "php84Extensions.zip",
]

[phases.install]
cmds = [
  "composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader",
  "npm ci",
]

[phases.build]
cmds = [
  "npm run build",
  "test -f public/build/manifest.json",
  "rm -rf node_modules",
  "mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache storage/app/public",
  "chmod -R ug+rwx storage bootstrap/cache",
]

# Pre-start ops (migrate + cache) digabung di start agar env Railway sudah ter-inject.
[start]
cmd = "php artisan storage:link --force && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
